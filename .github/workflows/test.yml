name: Test

on:
  push:
    branches:
      - '**'
      - '!dependabot/**'
    tags:
      - '**'
  pull_request:

jobs:
  ruby-versions:
    uses: ruby/actions/.github/workflows/ruby_versions.yml@master
    with:
      engine: cruby
      min_version: 2.6

  test:
    name: "Ruby ${{ matrix.ruby-version }}: ${{ matrix.runs-on }}"
    needs: ruby-versions
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ${{ fromJson(needs.ruby-versions.outputs.versions) }}
        runs-on:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        exclude:
          - {ruby-version: "2.6", runs-on: windows-latest}
          - {ruby-version: "2.7", runs-on: windows-latest}
          - {ruby-version: "3.0", runs-on: windows-latest}
          - {ruby-version: "3.1", runs-on: windows-latest}
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
      - name: Install system dependencies
        if: |
          runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -V -y libcairo-dev
      - name: Install system dependencies
        if: |
          runner.os == 'macOS'
        run: |
          brew bundle
      - name: Install system dependencies
        if: |
          runner.os == 'Windows'
        run: |
          ridk exec pacman --sync --noconfirm mingw-w64-x86_64-cairo mingw-w64-ucrt-x86_64-cairo mingw-w64-x86_64-pkgconf mingw-w64-ucrt-x86_64-pkgconf
      - name: Install dependencies
        run: |
          bundle install
      - name: Debug pkg-config (Windows)
        if: |
          runner.os == 'Windows'
        run: |
          echo "=== PATH ==="
          echo $env:Path
          echo ""
          echo "=== which pkgconf ==="
          Get-Command pkgconf -ErrorAction SilentlyContinue
          echo ""
          echo "=== which pkg-config ==="
          Get-Command pkg-config -ErrorAction SilentlyContinue
          echo ""
          echo "=== ridk exec which pkgconf ==="
          ridk exec which pkgconf
          echo ""
          echo "=== ridk exec pkgconf --version ==="
          ridk exec pkgconf --version
          echo ""
          echo "=== ridk exec pkgconf --cflags glib-2.0 ==="
          ridk exec pkgconf --cflags glib-2.0
      - name: Test
        run: |
          bundle exec rake
